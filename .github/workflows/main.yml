name: Main

on:
  push:
    branches:
      - main
      - elf2sbpf-from-4589040
  pull_request:
    branches:
      - main
      - elf2sbpf-from-4589040

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0
  ELF2SBPF_BIN: ${{ github.workspace }}/elf2sbpf/zig-out/bin/elf2sbpf

jobs:
  library:
    name: Build and test library
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Test library
        shell: bash
        run: zig build test --summary all

  programs:
    name: Build and test programs
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout elf2sbpf
        uses: actions/checkout@v4
        with:
          repository: DaviRain-Su/elf2sbpf
          path: elf2sbpf

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build elf2sbpf
        shell: bash
        working-directory: elf2sbpf
        run: zig build

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program-test/target
          key: cargo-${{ runner.os }}-${{ hashFiles('./program-test/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Install build deps
        shell: bash
        run: ./program-test/install-build-deps.sh

      - name: Build and test program
        shell: bash
        run: ./program-test/test.sh zig "$ELF2SBPF_BIN"

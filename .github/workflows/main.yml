name: Main

on:
  push:
    branches:
      - main
      - solana-zig-fork-0.16
  pull_request:
    branches:
      - main
      - solana-zig-fork-0.16

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_ZIG_VERSION: solana-v1.53.0

jobs:
  library:
    name: Build and test library
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig version
        shell: bash
        run: zig version
      - name: Test library
        shell: bash
        run: |
          set -o pipefail
          # Fresh build — see `programs` job for the rationale.
          rm -rf .zig-cache zig-out
          zig build test --summary all -freference-trace 2>&1 | tee test-output.txt
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}
          path: test-output.txt

  packages:
    name: Build and test packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/spl-token-group/rust-parity/target
            packages/spl-token-metadata/rust-parity/target
            packages/spl-transfer-hook/rust-parity/target
          key: package-rust-${{ runner.os }}-${{ hashFiles('./packages/*/rust-parity/Cargo.lock') }}
          restore-keys: |
            package-rust-${{ runner.os }}-
      - name: Test Zig packages
        shell: bash
        run: |
          set -euo pipefail
          for build_file in packages/*/build.zig; do
            echo "::group::zig build --build-file ${build_file} test"
            zig build --build-file "$build_file" test --summary all
            echo "::endgroup::"
          done
      - name: Test Rust parity fixtures
        shell: bash
        run: |
          set -euo pipefail
          for manifest in packages/*/rust-parity/Cargo.toml; do
            echo "::group::cargo test --manifest-path ${manifest}"
            cargo test --manifest-path "$manifest" --locked -j 4
            echo "::endgroup::"
          done

  programs:
    name: Build and test programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download solana-zig fork
        shell: bash
        run: |
          curl -LO "https://github.com/joncinque/solana-zig-bootstrap/releases/download/${SOLANA_ZIG_VERSION}/zig-x86_64-linux-musl.tar.bz2"
          tar -xjf zig-x86_64-linux-musl.tar.bz2
          echo "SOLANA_ZIG=$(pwd)/zig-x86_64-linux-musl-baseline/zig" >> "$GITHUB_ENV"
      - name: Test solana-zig version
        shell: bash
        run: |
          "$SOLANA_ZIG" version
          "$SOLANA_ZIG" targets | grep -i sbf

      - name: Test library with solana-zig
        shell: bash
        run: |
          # Always build from a clean slate so the CI catches any
          # `.bss` / `.data` regression on the BPF target (the SBPFv2
          # loader rejects programs with writable globals; a stale
          # `.zig-cache` once masked an `ErrorCode` regression).
          rm -rf .zig-cache zig-out
          "$SOLANA_ZIG" build test --summary all
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program-test/target
          key: cargo-${{ runner.os }}-${{ hashFiles('./program-test/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
      - name: Install build deps
        shell: bash
        run: ./program-test/install-build-deps.sh
      - name: Build and test programs
        shell: bash
        run: ./program-test/test.sh "$SOLANA_ZIG"
